<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" fill="#f5f2ea"/>
  <!-- Blue block: top-left -->
  <rect x="1" y="1" width="18" height="18" fill="#1749ff"/>
  <!-- Yellow block: top-right -->
  <rect x="21" y="1" width="10" height="10" fill="#ffde59"/>
  <!-- White block: middle-right -->
  <rect x="21" y="13" width="10" height="6" fill="#ffffff"/>
  <!-- Red block: bottom-left -->
  <rect x="1" y="21" width="10" height="10" fill="#e53935"/>
  <!-- Black block: bottom-middle -->
  <rect x="13" y="21" width="6" height="10" fill="#0d0d0d"/>
  <!-- Cream block: bottom-right -->
  <rect x="21" y="21" width="10" height="10" fill="#f5f2ea"/>
  <!-- Grid lines -->
  <line x1="0" y1="19.5" x2="32" y2="19.5" stroke="#0d0d0d" stroke-width="1"/>
  <line x1="19.5" y1="0" x2="19.5" y2="32" stroke="#0d0d0d" stroke-width="1"/>
  <line x1="11.5" y1="19.5" x2="11.5" y2="32" stroke="#0d0d0d" stroke-width="1"/>
  <line x1="19.5" y1="11.5" x2="32" y2="11.5" stroke="#0d0d0d" stroke-width="1"/>
  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="31" height="31" stroke="#0d0d0d" stroke-width="1" fill="none"/>
</svg>
